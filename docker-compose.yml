
version: '3.8'

services:
  gateway:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./data:/app/data
    restart: always

  # Remote N8N Service Mock/Bridge
  n8n-bridge:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=aura_secret
    restart: always
